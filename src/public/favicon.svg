<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#090d16"/>
  
  <!-- Outer glowing hexagon representing the secure verification shield -->
  <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="url(#g)" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Inner stylized monogram letters 'D' and 'C' interlaced with academic symbol -->
  <path d="M38,35 C38,35 48,32 55,35 C64,38 66,46 63,52 C60,58 53,62 44,61" fill="none" stroke="#f8fafc" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42,32 L42,66" fill="none" stroke="url(#g)" stroke-width="6.5" stroke-linecap="round"/>
  
  <!-- Verification green dot -->
  <circle cx="50" cy="50" r="4.5" fill="#10b981"/>
</svg>
